version: '3.8'

services:
  # Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./load-balancer/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - timeline-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    image: kong:latest
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
    volumes:
      - ./api-gateway/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
    networks:
      - timeline-network
    restart: unless-stopped

  # Service Discovery
  consul:
    image: consul:latest
    ports:
      - "8500:8500"
    command: "agent -server -ui -node=server-1 -bootstrap-expect=1 -client=0.0.0.0"
    networks:
      - timeline-network

  # Services
  post-service:
    build:
      context: ./post-service
    environment:
      - APP_PORT=8081
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - timeline-network

  timeline-service:
    build:
      context: ./timeline-service
    environment:
      - APP_PORT=8082
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - timeline-network

  notification-service:
    build:
      context: ./notification-service
    environment:
      - APP_PORT=8083
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - SMTP_HOST=mailhog
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - timeline-network

  # Specialized Workers
  fanout-worker:
    build:
      context: ./fanout-worker
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - WORKER_CONCURRENCY=5
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - timeline-network

  # Infrastructure
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=timeline_system
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - timeline-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - timeline-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - timeline-network

  # Observability
  prometheus:
    image: prom/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - timeline-network

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - timeline-network

networks:
  timeline-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
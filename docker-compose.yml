version: '3.9'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-timeline_system}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    env_file: .env
    environment: [APP_PORT=8083, DB_HOST=mysql, REDIS_HOST=redis]
    depends_on: [mysql, redis]
    ports: ["8083:8083"]

  post-service:
    build: ./post-service
    env_file: .env
    environment: [APP_PORT=8081, DB_HOST=mysql, REDIS_HOST=redis]
    depends_on: [mysql, redis, auth-service]
    ports: ["8081:8081"]

  follow-service:
    build: ./follow-service
    env_file: .env
    environment: [APP_PORT=8085, DB_HOST=mysql, REDIS_HOST=redis]
    depends_on: [mysql, redis, auth-service]
    ports: ["8085:8085"]

  timeline-service:
    build: ./timeline-service
    env_file: .env
    environment: [APP_PORT=8082, DB_HOST=mysql, REDIS_HOST=redis]
    depends_on: [mysql, redis, auth-service]
    ports: ["8082:8082"]

  fanout-worker:
    build: ./fanout-worker
    env_file: .env
    environment: [DB_HOST=mysql, REDIS_HOST=redis]
    depends_on: [mysql, redis]

  admin-service:
    build: ./admin-service
    env_file: .env
    environment: [APP_PORT=8086, DB_HOST=mysql, REDIS_HOST=redis]
    depends_on: [mysql, redis, auth-service]
    ports: ["8086:8086"]

volumes:
  mysql-data:
